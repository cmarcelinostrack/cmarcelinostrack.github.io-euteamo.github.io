<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para você ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;
  background: linear-gradient(135deg, #8e2de2, #4a00e0);
  overflow-x: hidden;

  opacity: 0;
  transform: translateY(15px);
  animation: entrarSite 1.2s ease forwards;
}

@keyframes entrarSite {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* fundo escuro fixo */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25);
  z-index: 0;
  pointer-events: none;
}

/* CORAÇÕES CORRIGIDOS */
.heart {
  position: fixed;
  font-size: 28px;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 0 12px rgba(255,255,255,0.7);
  animation: floatUp 9s linear infinite;
  z-index: 2;
  pointer-events: none;
}

@keyframes floatUp {
  0% {transform: translateY(110vh);}
  100% {transform: translateY(-10vh);}
}

.container {
  max-width: 750px;
  margin: auto;
  padding: 25px;
  position: relative;
  z-index: 3;
}

h1 {
  font-size: 28px;
  font-weight: 300;
  margin-bottom: 20px;
  min-height: 40px;
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  margin-top: 15px;
  background: white;
  color: black;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* galeria */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-top: 25px;
}

.gallery img {
  width: 100%;
  border-radius: 15px;
  border: 2px solid rgba(255,255,255,0.3);
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
  border-color: rgba(255,255,255,0.7);
}

/* mensagem */
#mensagem {
  margin-top: 40px;
  background: rgba(0,0,0,0.25);
  padding: 20px;
  border-radius: 15px;
  border: 1px solid rgba(255,255,255,0.2);
  text-align: left;
  white-space: pre-line;
}
</style>

</head>

<body>

<!-- CORAÇÕES -->
<div class="heart" style="left:10%;">🤍</div>
<div class="heart" style="left:25%; animation-delay:2s;">🤍</div>
<div class="heart" style="left:40%; animation-delay:4s;">🤍</div>
