<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para você ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;
  background: linear-gradient(135deg, #8e2de2, #4a00e0);
  overflow-x: hidden;
  scroll-behavior: smooth;
}

/* fundo escuro */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.25);
  z-index: -2;
}

/* corações */
.heart {
  position: fixed;
  font-size: 28px;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 0 12px rgba(255,255,255,0.7);
  animation: floatUp 9s linear infinite;
  z-index: -1;
}

@keyframes floatUp {
  0% {transform: translateY(110vh);}
  100% {transform: translateY(-10vh);}
}

/* container */
.container {
  max-width: 750px;
  margin: auto;
  padding: 25px;
}

/* título */
h1 {
  font-size: 28px;
  font-weight: 300;
  margin-bottom: 20px;
  min-height: 40px;
}

/* botão */
button {
  padding: 12px 18px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  margin-top: 15px;
  background: white;
  color: black;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* galeria */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-top: 25px;
}

.gallery img {
  width: 100%;
  border-radius: 15px;
  border: 2px solid rgba(255,255,255,0.3);
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
  border-color: rgba(255,255,255,0.7);
}

/* texto */
#mensagem {
  margin-top: 40px;
  background: rgba(0,0,0,0.25);
  padding: 20px;
  border-radius: 15px;
  border: 1px solid rgba(255,255,255,0.2);
  text-align: left;
  white-space: pre-line;
}
</style>

</head>

<body>

<!-- corações -->
<div class="heart" style="left:10%;">🤍</div>
<div class="heart" style="left:25%; animation-delay:2s;">🤍</div>
<div class="heart" style="left:40%; animation-delay:4s;">🤍</div>
<div class="heart" style="left:60%; animation-delay:1s;">🤍</div>
<div class="heart" style="left:80%; animation-delay:3s;">🤍</div>

<div class="container">

<h1 id="titulo"></h1>

<button onclick="document.getElementById('mensagem').scrollIntoView({behavior:'smooth'})">
⬇ Ver mensagem
</button>

<!-- galeria -->
<div class="gallery">
  <img src="IMG-20260329-WA0070.jpg">
  <img src="IMG-20260329-WA0046.jpg">
  <img src="IMG-20260329-WA0048.jpg">
  <img src="IMG_20260324_190559.jpg">
</div>

<!-- mensagem -->
<div id="mensagem">
Eu pensei muito em tudo que aconteceu ontem...

(E aqui vai o seu texto inteiro igual antes)
</div>

</div>

<script>
// efeito de digitação
const texto = "Para você ❤️";
let i = 0;

function escrever() {
  if (i < texto.length) {
    document.getElementById("titulo").innerHTML += texto.charAt(i);
    i++;
    setTimeout(escrever, 120);
  }
}
escrever();
</script>

</body>
</html>
