<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para você ❤️</title>

<style>
body {
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  font-family: Arial;
  text-align: center;
  color: white;
  padding: 40px;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 15px;
  border: none;
  font-size: 16px;
}
</style>
</head>

<body>

<h1>Oi, meu amor ❤️</h1>

<p>
Eu fiz isso aqui pra você… porque você é importante pra mim.
</p>

<button onclick="mostrarMensagem()">Clica aqui 💌</button>

<p id="mensagem"></p>

<script>
function mostrarMensagem() {
  document.getElementById("mensagem").innerHTML = `
Eu pensei muito em tudo que aconteceu ontem.

E sendo bem sincero, eu não gostei da forma como eu agi. Principalmente do que eu te falei.

Aquela parte de dizer que era melhor nem olhar na sua cara na guarda mirim… eu sei que foi pesado, desnecessário e não foi justo com você. Eu falei no impulso, na raiva, mas isso não justifica. Eu errei nisso.

Eu acho que tudo começou porque a situação me deixou desconfortável. Eu realmente queria resolver com você, mas não daquele jeito, sem privacidade. Só que ao invés de explicar isso direito, eu acabei me fechando… e depois explodi do pior jeito.

E no meio disso tudo, eu sei que você também tava preocupada com a gente, ainda mais com a questão do tempo e de eu ir mudar de cidade. Eu devia ter levado isso mais em consideração na hora.

Eu não queria que uma discussão virasse algo tão grande assim.

Muito menos te machucar com o que eu falei.

Porque a verdade é que você é importante pra mim.

Eu gosto de você de verdade, e quero melhorar… por mim, por você, e pela gente.

Me desculpa pelo que eu fiz ontem. ❤️
`;
}
</script>

</body>
</html>
