<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para você ❤️</title>
<style>
body {
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;
  padding: 50px;
}
h1 {
  font-size: 3em;
}
p {
  font-size: 1.5em;
  max-width: 600px;
  margin: auto;
}
button {
  margin-top: 30px;
  padding: 15px 30px;
  font-size: 1.2em;
  border: none;
  border-radius: 20px;
  background-color: white;
  color: #ff4d6d;
  cursor: pointer;
}
button:hover {
  background-color: #ffe0e6;
}
</style>
</head>
<body>

<h1>Oi, meu amor ❤️</h1>

<p>
Desde que você entrou na minha vida, tudo ficou mais leve.  
Eu não sou muito bom com palavras… então fiz um site só pra você.
</p>

<button onclick="mostrarMensagem()">Clica aqui 💌</button>

<p id="mensagem"></p>

<script>
function mostrarMensagem() {
  document.getElementById("mensagem").innerHTML =
  "Oi meu amor, eu tava pensando hoje em tudo que nos dois ja passamos e tudo o que fizemos juntos, a discussão de ontem e etc.😥 Pensando em tudo isso e sem saber muito oque fazer, eu decidi meio de improviso criar um site.😅 (sim eu fui nesse nível) Só que isso nao é nada demais, até porque voce merece.🤍 Eu queria começar isso pedindo desculpas por tudo que eu disse sem pensar ontem e pelo jeito que eu tava te tratando,😔 eu sei que eu fui desnecessário, não precisava ter feito tudo aquilo.😭 Eu li todas as mensagens de ontem e cheguei a uma conclusão.☝🏼 A decisão tomada na real so vai machucar nos dois ainda mais!🔻 Eu definitivamente não quero isso. Decidi que ao invés de se tratarmos desse jeito na guarda e ficar aquele clima pesado,☝🏼 podemos nos tratar de forma um pouco mais natural e não tão extrema assim.😁 Vamos balancear as coisas conforme o necessário, eu prommeto pra você que eu vou tentar melhorar e ser mais compreensívo e seder ainda mais.😥 Nada melhor do que aprender na prática. Então vamos começar e vamos ajustando conforme o necessário.👍🏼 Mais uma vez me desculpa por ontem,😥 eu juro que vou te tar agir com mais compreensividade e nao ser mais tao bruto e extremista com você.😔 Eu te amo. 💖";
}
</script>

</body>
</html>
